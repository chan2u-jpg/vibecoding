<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 24px;
      text-align: center;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .input-area {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .toolbar {
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e7eb;
    }

    .toolbar span {
      font-size: 0.85rem;
      color: #6b7280;
    }

    .toolbar button {
      font-size: 0.8rem;
      color: #ef4444;
      background: none;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .toolbar button:hover {
      background: #fef2f2;
    }

    ul#list {
      list-style: none;
      padding: 12px 20px;
      min-height: 60px;
    }

    ul#list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      background: #f9fafb;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      transition: opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    ul#list li.done {
      opacity: 0.5;
    }

    ul#list li.done .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    ul#list li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    .empty-msg {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 24px 0;
    }

    .loading-msg {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 24px 0;
    }

    .error-msg {
      text-align: center;
      color: #ef4444;
      font-size: 0.85rem;
      padding: 12px 20px;
      background: #fef2f2;
      border-top: 1px solid #fca5a5;
    }

    footer {
      padding: 14px 20px;
      text-align: center;
      font-size: 0.78rem;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <p>구매할 항목을 추가하세요</p>
    </header>

    <div class="input-area">
      <input type="text" id="itemInput" placeholder="예: 우유, 계란, 빵..." maxlength="60" />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="toolbar">
      <span id="countLabel">항목 없음</span>
      <button onclick="clearAll()">전체 삭제</button>
    </div>

    <ul id="list"></ul>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <footer>항목은 Supabase에 저장됩니다</footer>
  </div>

  <script>
    // ── Supabase 초기화 ──────────────────────────────────
    const { createClient } = supabase;
    const db = createClient(
      'YOUR_SUPABASE_URL',       // 예: https://abcdefgh.supabase.co
      'YOUR_SUPABASE_ANON_KEY'   // Supabase 대시보드 → Settings → API → anon public
    );
    const TABLE = 'shopping_items';

    // ── 에러 표시 ────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    // ── 목록 렌더링 ──────────────────────────────────────
    async function renderList() {
      const ul = document.getElementById('list');
      ul.innerHTML = '<p class="loading-msg">불러오는 중...</p>';

      const { data: items, error } = await db
        .from(TABLE)
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        showError('데이터를 불러오지 못했습니다: ' + error.message);
        ul.innerHTML = '';
        return;
      }

      ul.innerHTML = '';

      if (!items || items.length === 0) {
        ul.innerHTML = '<p class="empty-msg">아직 항목이 없습니다.</p>';
        document.getElementById('countLabel').textContent = '항목 없음';
        return;
      }

      const done = items.filter(i => i.checked).length;
      document.getElementById('countLabel').textContent =
        `총 ${items.length}개 · 완료 ${done}개`;

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('done');

        li.innerHTML = `
          <input type="checkbox" ${item.checked ? 'checked' : ''}
            onchange="toggleItem('${item.id}', this.checked)" />
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="deleteItem('${item.id}')" title="삭제">✕</button>
        `;
        ul.appendChild(li);
      });
    }

    // ── 항목 추가 ────────────────────────────────────────
    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      input.value = '';
      input.focus();

      const { error } = await db.from(TABLE).insert({ text, checked: false });
      if (error) { showError('추가 실패: ' + error.message); return; }

      renderList();
    }

    // ── 항목 삭제 ────────────────────────────────────────
    async function deleteItem(id) {
      const { error } = await db.from(TABLE).delete().eq('id', id);
      if (error) { showError('삭제 실패: ' + error.message); return; }
      renderList();
    }

    // ── 체크 토글 ────────────────────────────────────────
    async function toggleItem(id, checked) {
      const { error } = await db.from(TABLE).update({ checked }).eq('id', id);
      if (error) { showError('수정 실패: ' + error.message); return; }
      renderList();
    }

    // ── 전체 삭제 ────────────────────────────────────────
    async function clearAll() {
      const { data: items } = await db.from(TABLE).select('id');
      if (!items || items.length === 0) return;
      if (!confirm('모든 항목을 삭제할까요?')) return;

      const { error } = await db.from(TABLE).delete().neq('id', '00000000-0000-0000-0000-000000000000');
      if (error) { showError('전체 삭제 실패: ' + error.message); return; }
      renderList();
    }

    // ── XSS 방지 ─────────────────────────────────────────
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Enter 키 지원 ────────────────────────────────────
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    // ── 초기 로드 ────────────────────────────────────────
    renderList();
  </script>
</body>
</html>
